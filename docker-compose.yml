services:
  api:
    container_name: tennis-api
    build:
      context: ./api
    restart: unless-stopped
      #ports:
      # - "3000:3000"
    environment:
      APP_PASSWORD: ${APP_PASSWORD}
      PORT: "3000"
      DATA_DIR: /data
    volumes:
      - api-data:/data

  frontend:
    container_name: tennis-frontend
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
      #ports:
      #- "8080:80"

volumes:
  api-data:
networks:
  default:
    external: true
    name: npm
