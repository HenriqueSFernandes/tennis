name: Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: registry.henriquesf.me
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            registry.henriquesf.me/rio-tinto-api:${{ github.sha }}
            registry.henriquesf.me/rio-tinto-api:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            registry.henriquesf.me/rio-tinto-frontend:${{ github.sha }}
            registry.henriquesf.me/rio-tinto-frontend:latest
      - name: Update NixOS Config
        run: |
          git config --global user.email "nix-bot@henriquesf.me"
          git config --global user.name "NixOS Deployment Bot"

          git clone https://x-access-token:${{ secrets.NIX_TOKEN }}@github.com/HenriqueSFernandes/dotfiles-server.git
          cd dotfiles-server

          sed -i 's|image = "registry.henriquesf.me/rio-tinto-frontend:.*";|image = "registry.henriquesf.me/rio-tinto-frontend:${{ github.sha }}";|' services/riotinto.nix
          sed -i 's|image = "registry.henriquesf.me/rio-tinto-api:.*";|image = "registry.henriquesf.me/rio-tinto-api:${{ github.sha }}";|' services/riotinto.nix

          git add .
          git commit -m "deploy: update riotinto-tennis to ${{ github.sha }}"
          git push

